name: "Frogbot Security Scan"

on:
  pull_request_target: 
    types: [opened, synchronize] # Triggers scan-pr flow for every opened/updated pull request
  push: # Triggers scan-repo flow for every push to the specified branches
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"   # The repository will be scanned once a day at 00:00 GMT.
  workflow_dispatch: # The repository will be scanned on demand

permissions:
  pull-requests: write
  contents: write
  security-events: write
  # [Mandatory If using OIDC authentication protocol instead of JF_ACCESS_TOKEN]
  # id-token: write

jobs:
  frogbot-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ["main"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 7.6.3
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6.3'
          validate-wrappers: false

      - name: Inject Global Dummy Artifactory Method
        run: |
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/init.gradle
          class DummyExtension {
              def methodMissing(String name, args) { 
                  return new DummyExtension() 
              }
              def propertyMissing(String name) { 
                  return new DummyExtension()
              }
          }

          allprojects {
              initscript {
                  try {
                      extensions.add("artifactoryPublish", new DummyExtension())
                  } catch (Exception e) {
                  }
              }
          }
          EOF

      - name: Download Frogbot CLI
        run: |
          curl -fL "https://releases.jfrog.io/artifactory/frogbot/v2/2.32.3/frogbot-linux-amd64/frogbot" -o frogbot
          
          if head -n 1 frogbot | grep -q "DOCTYPE"; then
              cat frogbot
              exit 1
          fi
          
          chmod +x frogbot
          sudo mv frogbot /usr/local/bin/

      - name: Run Frogbot Scan (With Error Suppression)
        run: |
          frogbot scan-repository || true
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JF_GIT_BASE_BRANCH: ${{ matrix.branch }}
          JFROG_CLI_DEPENDENCIES_DIR: ""
          JFROG_CLI_SUB_COMMAND_EXECUTABLE: "gradle"
          useWrapper: false
          JF_FIX_AND_PR: "false"

      # - uses: jfrog/frogbot@v2
      #   env:
      #     JF_URL: ${{ secrets.JF_URL }}
      #     JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
      #     JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     JF_GIT_BASE_BRANCH: ${{ matrix.branch }}
