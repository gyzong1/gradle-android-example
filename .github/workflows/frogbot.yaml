name: "Frogbot Security Scan"

on:
  pull_request_target: 
    types: [opened, synchronize] # Triggers scan-pr flow for every opened/updated pull request
  push: # Triggers scan-repo flow for every push to the specified branches
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"   # The repository will be scanned once a day at 00:00 GMT.
  workflow_dispatch: # The repository will be scanned on demand

permissions:
  pull-requests: write
  contents: write
  security-events: write
  # [Mandatory If using OIDC authentication protocol instead of JF_ACCESS_TOKEN]
  # id-token: write

jobs:
  frogbot-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ["main"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 7.6.3
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6.3'
          validate-wrappers: false

      - name: Inject Global Dummy Artifactory Method
        run: |
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/init.gradle
          allprojects {
              // 自动检测当前是不是 Frogbot 的生成依赖树任务
              def isFrogbotScan = gradle.startParameter.taskNames.any { it.contains("generateDepTrees") || it.contains("dependencies") }
              
              if (isFrogbotScan) {
                  // 1. 如果项目已经由于某种原因存在该扩展，直接移除它
                  if (extensions.findByName("artifactoryPublish")) {
                      extensions.remove("artifactoryPublish")
                  }
                  
                  // 2. 注册一个“黑洞”方法，吞掉所有对 artifactoryPublish 的调用和它内部所有的子配置（如 publications）
                  // methodMissing 是 Groovy 的元编程黑科技，能动态吃掉任何未定义的方法调用而不报错
                  metaClass.artifactoryPublish = { Closure c -> 
                      c.delegate = new Expando()
                      c.resolveStrategy = Closure.DELEGATE_FIRST
                      c()
                  }
              }
          }
          EOF

      - uses: jfrog/frogbot@v2
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JF_GIT_BASE_BRANCH: ${{ matrix.branch }}
          useWrapper: false
          # JFROG_CLI_DEPENDENCIES_DIR: "" 
          # EXECUTABLE_PATH: "gradle"
          # JFROG_CLI_SUB_COMMAND_EXECUTABLE: "gradle"
          # JFROG_CLI_SUB_COMMAND_ARGS: "-PdisableArtifactoryPublish=true"
