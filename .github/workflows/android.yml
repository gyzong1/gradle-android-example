name: "Setup JFrog CLI Example"
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          # JFrog platform url (for example: https://artifactory_url)
          JF_URL: ${{ vars.JF_URL }}

          # JFrog Platform access token
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

          # Basic authentication credentials
          ## JF_USER: ${{ secrets.JF_USER }}
          ## JF_PASSWORD: ${{ secrets.JF_PASSWORD }}

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4 
        with:
          validate-wrappers: false
          gradle-version: '7.6.3'

      - name: Publish to Artifactory with Gradle
        env:
          JFROG_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          ARTIFACTORY_USER: guoyunzong
        run: |
          gradle clean build 

      - name: Run JFrog CLI
        run: |
          # # Ping the server
          jf rt ping
          # # Build
          # jf gradle clean assembleRelease artifactoryPublish

          # # Collect environment variables for the build
          # jf rt bce
          # # Collect VCS details from git and add them to the build
          # jf rt bag
          # # Publish build info
          # jf rt bp
